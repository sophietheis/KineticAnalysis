name: Build Windows Executable

on:
  push:
    branches:
      - main  # Runs the workflow every time code is pushed to the 'main' branch
  pull_request:
    branches:
      - main  # Runs the workflow for pull requests to the 'main' branch

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Create a file and write text
        shell: powershell
        run: |
          $hookPath = "C:\hostedtoolcache\windows\Python\3.11.9\x64\Lib\site-packages\PyInstaller\hooks"
          $filePath = Join-Path $hookPath "hook-seleniumwire.py"

          # Make sure the hooks directory exists
          if (-not (Test-Path $hookPath)) {
            New-Item -ItemType Directory -Path $hookPath -Force
          }

          # Write the required Python code
          $content = @"
               from PyInstaller.utils.hooks import collect_data_files
               datas = collect_data_files('seleniumwire')
               "@
          $content | Out-File -FilePath $filePath -Encoding utf8 -Force
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller==6.11.0
          pip install dash dash-html-components dash-core-components dash-bootstrap-components 
          pip install dash-spinner dash_table
          pip install numpy pandas threaded tk plotly
          pip install scipy multipletau 
          pip install pyqt5 pyqtwebengine
          pip install pywebview
          
      - name: Create Executable with PyInstaller
        run: |
          pyinstaller kinetic_analysis/app_dash_windows_gh.spec

      - name: Upload Executable
        uses: actions/upload-artifact@v4
        with:
          name: KineticAnalysisWindows
          path: dist\KineticAnalysisWindows.exe
